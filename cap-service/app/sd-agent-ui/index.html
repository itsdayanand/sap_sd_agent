
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SD Order Intelligence Agent</title>
<style>
  /* ── Design tokens ──────────────────────────────────────────────
     Deliberately plain CSS, no framework, no build step. A working
     tool for SAP consultants, not a marketing surface. */
  :root {
    --bg: #0f1419;
    --surface: #161d26;
    --surface-raised: #1c2530;
    --border: #2a3441;
    --text: #e8ecf1;
    --text-dim: #8b97a6;
    --accent: #e0a458;
    --user-bubble: #2563a8;
    --success: #5fb88a;
    --warn: #d98a3d;
    --error: #d9636b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14.5px;
  }
  button { font-family: inherit; cursor: pointer; }
  code { font-family: 'SF Mono', Consolas, monospace; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  #app { display: flex; height: 100vh; }

  /* ── Sidebar ────────────────────────────────────────────────── */
  #sidebar {
    width: 230px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 12px;
    flex-shrink: 0;
    /* min-height: 0 overrides flexbox's default min-height: auto on
       flex items. Without it, #sidebar (a flex item of #app) is free
       to grow taller than #app's 100vh to fit its content — including
       a long #session-list — instead of being constrained to the
       viewport so its own children's overflow rules can take effect. */
    min-height: 0;
  }
  #sidebar .brand { display: flex; align-items: center; gap: 8px; padding: 4px 4px 16px; }
  #sidebar .brand-title { font-weight: 700; font-size: 14px; }
  #sidebar .brand-sub { font-size: 11px; color: var(--text-dim); }
  #new-session-btn {
    background: var(--accent); color: #1a1208; border: none; border-radius: 6px;
    padding: 8px 12px; font-weight: 600; font-size: 13px; margin-bottom: 12px;
  }
  #session-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    /* Same fix as #sidebar above, one level deeper: #session-list is
       itself a flex child (of #sidebar) with flex: 1 and overflow-y:
       auto, but a flex child's default min-height: auto lets it expand
       to fit all of its content instead of clamping to its flex-basis.
       That silently defeats overflow-y: auto — the scrollbar never
       appears because the box never actually gets shorter than its
       content; #sidebar (and the whole page) just grows past the
       viewport instead. min-height: 0 is the standard fix for nested
       scrollable flex columns. */
    min-height: 0;
  }
  .session-row {
    display: flex; align-items: center; gap: 2px;
    border-radius: 6px;
  }
  .session-row.active { background: var(--surface-raised); }
  .session-item {
    flex: 1; min-width: 0;
    text-align: left; background: transparent; border: none; border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-size: 13px;
    /* Buttons inherit an inconsistent default line-height from the
       browser's UA stylesheet for form controls — tighter than the
       body's 1.5 in some rendering contexts. That let each row's text
       sit lower in its box than expected, so descenders visually
       overlapped the row below even with #session-list's 4px gap
       intact. Setting line-height explicitly removes the browser
       default from the equation. */
    line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-rename-btn {
    flex-shrink: 0; background: transparent; border: none;
    padding: 6px 8px; font-size: 12px; border-radius: 6px;
    opacity: 0; transition: opacity 0.1s;
  }
  /* Only show the pencil on hover/focus of the row it belongs to —
     keeps the sidebar visually quiet when the person isn't interacting
     with it, rather than permanently showing 50 little pencil icons. */
  .session-row:hover .session-rename-btn,
  .session-rename-btn:focus-visible {
    opacity: 1;
  }
  .session-rename-btn:hover { background: var(--surface); }
  .session-delete-btn:hover { background: rgba(217, 99, 107, 0.15); }
  #cap-status { font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }

  /* ── Main chat column ───────────────────────────────────────── */
  #main { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header p { font-size: 12px; margin: 0; color: var(--text-dim); }
  .header-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 6px; padding: 6px 12px; font-size: 12px;
  }
  .header-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── Data source toggle (Live / Mock) ───────────────────────── */
  #source-toggle {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px; margin-right: 8px;
  }
  #source-toggle label {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 4px 10px; border-radius: 999px;
    cursor: pointer; color: var(--text-dim); user-select: none;
  }
  #source-toggle input[type="radio"] { display: none; }
  #source-toggle input[type="radio"]:checked + span {
    color: #1a1208;
  }
  #source-toggle label:has(input:checked) {
    background: var(--accent);
  }
  #source-toggle label:has(input:checked) span { color: #1a1208; font-weight: 600; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .empty-hint { color: var(--text-dim); font-size: 13px; padding: 8px 4px 4px; }

  .msg-row { display: flex; gap: 8px; }
  .msg-row.user { justify-content: flex-end; }
  .msg-icon { font-size: 22px; }
  .bubble {
    max-width: 75%; border-radius: 16px; padding: 10px 14px;
    font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }
  .bubble.assistant { background: var(--surface); border: 1px solid var(--border); }
  .bubble.user { background: var(--user-bubble); color: #fff; }
  .cursor { animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Tool call panel ────────────────────────────────────────── */
  .tool-panel {
    margin: 4px 0 0 40px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 13px; background: var(--surface);
    /* flex-shrink: 0 is the key fix here — #messages is a flex column
       with overflow-y: auto, and without this, a block child combined
       with overflow:hidden could get squeezed to fit the container's
       remaining visible height instead of growing to fit all of its
       content. That capped the panel's height once there were enough
       tool calls to exceed the visible chat area, silently clipping
       the bottom entries even though they existed in the DOM. */
    flex-shrink: 0;
  }
  .tool-panel-toggle {
    width: 100%; padding: 8px 12px; text-align: left; color: var(--text-dim);
    background: transparent; border: none; display: flex; align-items: center; gap: 8px;
    border-radius: 6px 6px 0 0;
  }
  .tool-details-wrap { border-radius: 0 0 6px 6px; overflow: hidden; }
  .tool-call-detail { padding: 8px 12px; border-top: 1px solid var(--border); }
  .tool-call-detail:last-child { border-radius: 0 0 6px 6px; }
  .tool-call-detail .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-weight: 600; }
  .tool-call-detail .status-running { color: var(--warn); }
  .tool-call-detail .status-done { color: var(--success); }
  .tool-call-detail code {
    display: block; font-size: 12px; background: var(--surface-raised);
    border-radius: 4px; padding: 4px; margin-bottom: 4px; white-space: pre-wrap; word-break: break-word;
  }

  /* ── Prompt chips ───────────────────────────────────────────── */
  #prompt-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 16px; }
  .chip {
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
    border-radius: 999px; padding: 6px 14px; font-size: 13px;
  }

  /* ── Composer ───────────────────────────────────────────────── */
  footer { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #composer-input {
    flex: 1; padding: 10px 16px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px;
  }
  #send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: var(--accent); color: #1a1208; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #send-btn:disabled { background: var(--border); }
</style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <span style="font-size:20px;">🛰️</span>
        <div>
          <div class="brand-title">SD Order Intelligence</div>
          <div class="brand-sub">SAP AI Agent · BTP Trial</div>
        </div>
      </div>
      <button id="new-session-btn">+ New conversation</button>
      <div id="session-list"></div>
      <div id="cap-status">CAP service: <span id="cap-status-value">checking…</span></div>
    </aside>

    <div id="main">
      <header>
        <div>
          <h1>SD Order Intelligence Agent</h1>
          <p>CAP · FastAPI · GPT-4o · SQLite · SAP S/4HANA Sandbox</p>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <div id="source-toggle">
            <label>
              <input type="radio" name="data-source" id="source-live" value="live" checked />
              <span>🟢 Live</span>
            </label>
            <label>
              <input type="radio" name="data-source" id="source-mock" value="mock" />
              <span>🧪 Mock</span>
            </label>
          </div>
          <button id="copy-btn" class="header-btn" disabled>Copy</button>
          <button id="clear-btn" class="header-btn" disabled>Clear</button>
        </div>
      </header>

      <main id="messages">
        <div class="empty-hint" id="empty-hint">
          Ask about open orders, deliveries, pricing, or billing for any sandbox customer.
        </div>
      </main>

      <div id="prompt-chips"></div>

      <footer>
        <input id="composer-input" type="text" placeholder="Ask about orders, deliveries, pricing, billing…" />
        <button id="send-btn">➤</button>
      </footer>
    </div>
  </div>

<script>
// ──────────────────────────────────────────────────────────────────
// Configuration
// ──────────────────────────────────────────────────────────────────
// In production, this UI is served by the SAME CAP app as the OData
// service, so relative paths would work for CAP's own endpoints.
// AGENT_URL points at the separate FastAPI service, which is a
// different app/route on CF. Set this via the AGENT_URL global
// below before deploying, or override at runtime with
// ?agent=https://your-fastapi-route... for local testing.
const AGENT_URL = (new URLSearchParams(location.search).get('agent'))
  || window.AGENT_URL
  || 'https://sd-agent-backend.cfapps.us10-001.hana.ondemand.com';

const TOOL_ICONS = {
  get_sales_orders: '📋',
  get_customer_details: '👤',
  get_pricing_conditions: '💰',
  get_delivery_status: '🚚',
  get_billing_documents: '🧾',
};

const PROMPTS = [
  'Show open orders for customer 10100001',
  'Check delivery status for order 10',
  'Any pricing discounts for customer 10100001 on material MAT-100?',
  'Status of all orders for customer 10100001 — any issues?',
];

// ──────────────────────────────────────────────────────────────────
// Session management (sessionStorage + localStorage, no React state)
// ──────────────────────────────────────────────────────────────────
const SESSION_KEY = 'sd-agent-session-id';
const SESSIONS_LIST_KEY = 'sd-agent-session-list';

function listSessions() {
  try {
    const raw = localStorage.getItem(SESSIONS_LIST_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveSessionsList(sessions) {
  localStorage.setItem(SESSIONS_LIST_KEY, JSON.stringify(sessions.slice(0, 50)));
}

function registerSessionIfNew(id, label) {
  const sessions = listSessions();
  if (sessions.some(s => s.id === id)) return;
  sessions.unshift({ id, label: (label || 'New conversation').slice(0, 60), createdAt: Date.now() });
  saveSessionsList(sessions);
}

// Updates a session's stored label in place. Used both by the rename-
// on-click flow in the sidebar and (indirectly) by createNewSession's
// optional name prompt. Silently no-ops if the id isn't found, since a
// rename racing a "Clear"/delete elsewhere shouldn't throw.
function renameSession(id, newLabel) {
  const trimmed = (newLabel || '').trim();
  if (!trimmed) return;
  const sessions = listSessions();
  const session = sessions.find(s => s.id === id);
  if (!session) return;
  session.label = trimmed.slice(0, 60);
  saveSessionsList(sessions);
}

// Removes a session from the local sidebar list only — this does NOT
// delete the underlying ChatSessions/ChatMessages rows in CAP/SQLite,
// since there's no DELETE action exposed for that on the backend today.
// Functionally this just "hides" the conversation from this browser's
// sidebar; the transcript itself is untouched server-side, which is a
// deliberately conservative default (no destructive server call wired
// to a single client-side click) until/unless an explicit delete
// endpoint is added.
function deleteSessionFromList(id) {
  const sessions = listSessions().filter(s => s.id !== id);
  saveSessionsList(sessions);
}

async function fetchNewSessionId() {
  const res = await fetch(`${AGENT_URL}/api/session/new`, { method: 'POST' });
  if (!res.ok) throw new Error('Could not start a new session.');
  const data = await res.json();
  return data.session_id;
}

async function fetchSessionHistory(id) {
  const res = await fetch(`${AGENT_URL}/api/session/${id}/history`);
  if (!res.ok) throw new Error('Could not load this conversation.');
  const data = await res.json();
  return data.messages || [];
}

async function getOrCreateSessionId() {
  const existing = sessionStorage.getItem(SESSION_KEY);
  if (existing) return existing;
  const id = await fetchNewSessionId();
  sessionStorage.setItem(SESSION_KEY, id);
  return id;
}

async function createNewSession(initialLabel) {
  const id = await fetchNewSessionId();
  sessionStorage.setItem(SESSION_KEY, id);
  const sessions = listSessions();
  sessions.unshift({ id, label: (initialLabel || 'New conversation').slice(0, 60), createdAt: Date.now() });
  saveSessionsList(sessions);
  return id;
}

// ──────────────────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────────────────
let sessionId = null;
let isStreaming = false;
let messages = []; // [{ role, content, toolCalls: [{tool,args,result,status}] }]

// ──────────────────────────────────────────────────────────────────
// Rendering
// ──────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const emptyHintEl = document.getElementById('empty-hint');
const promptChipsEl = document.getElementById('prompt-chips');
const copyBtn = document.getElementById('copy-btn');
const clearBtn = document.getElementById('clear-btn');
const sendBtn = document.getElementById('send-btn');
const composerInput = document.getElementById('composer-input');
const sessionListEl = document.getElementById('session-list');
const capStatusValueEl = document.getElementById('cap-status-value');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Minimal markdown: bold, inline code, and line breaks only.
// Intentionally not a full markdown renderer — keeps this file
// dependency-free. Good enough for the agent's short business summaries.
function renderMarkdownLite(text) {
  let safe = escapeHtml(text);
  safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
  safe = safe.replace(/\n/g, '<br>');
  return safe;
}

// Tracks DOM elements per message index so we can update them in place
// rather than tearing down and rebuilding the entire list on every
// streamed token. A full rebuild on every token caused two visible bugs:
// (1) mid-paint tearing (a line would render half-drawn), and
// (2) any expanded tool panel snapped shut, since its open/closed state
// lived only in a local JS closure tied to a DOM node that kept getting
// destroyed and recreated.
const messageElements = []; // [{ row, bubble, cursor, toolPanel }]

function renderMessages() {
  emptyHintEl.style.display = messages.length ? 'none' : 'block';
  copyBtn.disabled = !messages.length;
  clearBtn.disabled = !messages.length;
  promptChipsEl.style.display = messages.length ? 'none' : 'flex';

  // Remove DOM entries for messages that no longer exist (e.g. after Clear).
  while (messageElements.length > messages.length) {
    const stale = messageElements.pop();
    stale.row?.remove();
    stale.toolPanel?.remove();
  }

  messages.forEach((msg, i) => {
    if (!messageElements[i]) {
      messageElements[i] = createMessageElement(msg);
      messagesEl.appendChild(messageElements[i].row);
    }
    updateMessageElement(messageElements[i], msg, i);
  });

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function createMessageElement(msg) {
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;

  if (msg.role === 'assistant') {
    const icon = document.createElement('span');
    icon.className = 'msg-icon';
    icon.textContent = '🛰️';
    row.appendChild(icon);
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${msg.role}`;
  row.appendChild(bubble);

  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.textContent = '▌';

  if (msg.role === 'user') {
    const icon = document.createElement('span');
    icon.className = 'msg-icon';
    icon.textContent = '🧑‍💼';
    row.appendChild(icon);
  }

  return { row, bubble, cursor, toolPanel: null, toolPanelToolCount: 0 };
}

function updateMessageElement(el, msg, i) {
  // Only touch innerHTML if the rendered content actually changed —
  // avoids unnecessary reflows and keeps any nested state (like the
  // tool panel below) untouched when only the bubble text grew.
  const html = renderMarkdownLite(msg.content || (msg.streaming ? '…' : ''));
  if (el.bubble.innerHTML !== html) {
    el.bubble.innerHTML = html;
  }
  if (msg.streaming && el.cursor.parentNode !== el.bubble) {
    el.bubble.appendChild(el.cursor);
  } else if (!msg.streaming && el.cursor.parentNode === el.bubble) {
    el.cursor.remove();
  }

  // Tool panel: only rebuild if the number of tool calls changed, or
  // create it for the first time. Updating an existing call's status/
  // result happens in place via updateToolPanel, so expand/collapse
  // state (which lives inside renderToolPanel's closure) survives.
  if (msg.toolCalls && msg.toolCalls.length) {
    if (!el.toolPanel) {
      el.toolPanel = renderToolPanel(msg.toolCalls);
      el.toolPanelToolCount = msg.toolCalls.length;
      // Insert right after this message's row.
      el.row.after(el.toolPanel);
    } else if (el.toolPanelToolCount !== msg.toolCalls.length) {
      // Tool call count changed (e.g. a new concurrent tool call was
      // added) — rebuild.
      const fresh = renderToolPanel(msg.toolCalls);
      el.toolPanel.replaceWith(fresh);
      el.toolPanel = fresh;
      el.toolPanelToolCount = msg.toolCalls.length;
    } else {
      // Same number of calls — update statuses/results in place.
      updateToolPanelContents(el.toolPanel, msg.toolCalls);
    }
  } else if (el.toolPanel) {
    // Defensive: toolCalls is empty but a panel still exists. Shouldn't
    // happen in normal flow (toolCalls only grows within a turn), but
    // remove any stale panel rather than leave one frozen on screen.
    el.toolPanel.remove();
    el.toolPanel = null;
    el.toolPanelToolCount = 0;
  }
}

function renderToolPanel(toolCalls) {
  const panel = document.createElement('div');
  panel.className = 'tool-panel';

  const toggle = document.createElement('button');
  toggle.className = 'tool-panel-toggle';
  let open = false;
  toggle.textContent = `🔍 Agent used ${toolCalls.length} SAP tool${toolCalls.length > 1 ? 's' : ''} ▼`;

  const detailsWrap = document.createElement('div');
  detailsWrap.style.display = 'none';
  detailsWrap.className = 'tool-details-wrap';

  toggle.onclick = () => {
    open = !open;
    detailsWrap.style.display = open ? 'block' : 'none';
    toggle.textContent = `🔍 Agent used ${toolCalls.length} SAP tool${toolCalls.length > 1 ? 's' : ''} ${open ? '▲' : '▼'}`;
  };

  toolCalls.forEach((tc, idx) => {
    detailsWrap.appendChild(buildToolCallDetail(tc, idx));
  });

  panel.appendChild(toggle);
  panel.appendChild(detailsWrap);
  return panel;
}

function buildToolCallDetail(tc, idx) {
  const detail = document.createElement('div');
  detail.className = 'tool-call-detail';
  detail.dataset.toolIndex = String(idx);

  const row = document.createElement('div');
  row.className = 'row';
  const name = document.createElement('span');
  name.textContent = `${TOOL_ICONS[tc.tool] || '⚙️'} ${tc.tool}`;
  const status = document.createElement('span');
  status.className = 'tool-status ' + (tc.status === 'running' ? 'status-running' : 'status-done');
  status.textContent = tc.status === 'running' ? '⏳ Running…' : '✅ Done';
  row.appendChild(name);
  row.appendChild(status);
  detail.appendChild(row);

  const argsCode = document.createElement('code');
  argsCode.textContent = `Params: ${JSON.stringify(tc.args)}`;
  detail.appendChild(argsCode);

  if (tc.result != null) {
    const resultStr = JSON.stringify(tc.result);
    const resultCode = document.createElement('code');
    resultCode.className = 'tool-result';
    resultCode.textContent = resultStr.length > 400 ? resultStr.slice(0, 400) + '…' : resultStr;
    detail.appendChild(resultCode);
  }

  return detail;
}

// Updates an existing tool panel's status/result text in place,
// without removing or recreating the panel — this is what lets an
// expanded panel stay expanded while a tool call resolves.
function updateToolPanelContents(panel, toolCalls) {
  const detailsWrap = panel.querySelector('.tool-details-wrap');
  if (!detailsWrap) return;

  toolCalls.forEach((tc, idx) => {
    const detail = detailsWrap.querySelector(`.tool-call-detail[data-tool-index="${idx}"]`);
    if (!detail) return;

    const statusEl = detail.querySelector('.tool-status');
    if (statusEl) {
      statusEl.className = 'tool-status ' + (tc.status === 'running' ? 'status-running' : 'status-done');
      statusEl.textContent = tc.status === 'running' ? '⏳ Running…' : '✅ Done';
    }

    const existingResult = detail.querySelector('.tool-result');
    if (tc.result != null && !existingResult) {
      const resultStr = JSON.stringify(tc.result);
      const resultCode = document.createElement('code');
      resultCode.className = 'tool-result';
      resultCode.textContent = resultStr.length > 400 ? resultStr.slice(0, 400) + '…' : resultStr;
      detail.appendChild(resultCode);
    }
  });
}

function renderPromptChips() {
  promptChipsEl.innerHTML = '';
  for (const p of PROMPTS) {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = p;
    chip.onclick = () => {
      // Populate the input for editing (e.g. swapping in a real
      // customer/order ID from the sandbox) rather than sending
      // immediately — the person can tweak numbers before pressing
      // Enter or the send button.
      composerInput.value = p;
      composerInput.focus();
      // Place the cursor at the end so editing feels natural.
      composerInput.setSelectionRange(p.length, p.length);
    };
    promptChipsEl.appendChild(chip);
  }
}

function renderSessionList() {
  sessionListEl.innerHTML = '';
  const sessions = listSessions();
  if (!sessions.length) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--text-dim)';
    empty.style.fontSize = '12px';
    empty.style.padding = '8px';
    empty.textContent = 'No saved conversations yet.';
    sessionListEl.appendChild(empty);
    return;
  }
  for (const s of sessions) {
    // Wrap the session button and its rename control in a row so the
    // pencil icon can sit flush against the right edge without
    // affecting the button's own click target or text truncation.
    const row = document.createElement('div');
    row.className = 'session-row' + (s.id === sessionId ? ' active' : '');

    const btn = document.createElement('button');
    btn.className = 'session-item';
    btn.textContent = s.label;
    btn.title = s.label;
    btn.onclick = () => switchSession(s.id);
    row.appendChild(btn);

    const renameBtn = document.createElement('button');
    renameBtn.className = 'session-rename-btn';
    renameBtn.textContent = '✏️';
    renameBtn.title = 'Rename conversation';
    renameBtn.onclick = (e) => {
      // Stop propagation so clicking the pencil never also triggers
      // switchSession via the row beneath it.
      e.stopPropagation();
      const next = window.prompt('Rename conversation', s.label);
      if (next === null) return; // person cancelled
      renameSession(s.id, next);
      renderSessionList();
    };
    row.appendChild(renameBtn);

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'session-rename-btn session-delete-btn';
    deleteBtn.textContent = '🗑️';
    deleteBtn.title = 'Delete conversation';
    deleteBtn.onclick = (e) => {
      e.stopPropagation();
      const confirmed = window.confirm(`Delete "${s.label}"? This removes it from your sidebar (the saved transcript on the server is not deleted).`);
      if (!confirmed) return;
      deleteSessionFromList(s.id);
      if (s.id === sessionId) {
        // The deleted session was the one currently open — clear the
        // chat view rather than leaving a stale conversation on screen
        // with no corresponding sidebar entry. sessionId is left as-is
        // (not cleared/reset) since the underlying session+history
        // still exists server-side; only the local sidebar shortcut
        // to it is gone. Sending a new message here will still work,
        // it just won't be one-click-reachable from the sidebar anymore.
        messages = [];
        renderMessages();
      }
      renderSessionList();
    };
    row.appendChild(deleteBtn);

    sessionListEl.appendChild(row);
  }
}

// ──────────────────────────────────────────────────────────────────
// SSE streaming
// ──────────────────────────────────────────────────────────────────
async function parseSSEStream(response, callbacks) {
  if (!response.body) { callbacks.onError('No response body from server.'); return; }
  if (!response.ok) {
    let detail = '';
    try {
      const body = await response.json();
      if (typeof body.detail === 'string') {
        // A plain HTTPException(detail="...") — the common case.
        detail = body.detail;
      } else if (Array.isArray(body.detail)) {
        // Pydantic validation errors return detail as an array of
        // {type, loc, msg, ...} objects, not a string. Concatenating
        // that array directly into a template string previously produced
        // the literal text "[object Object]" instead of anything useful.
        detail = body.detail.map(d => d.msg || JSON.stringify(d)).join('; ');
      }
    } catch {}
    callbacks.onError(detail || `Server returned ${response.status}.`);
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() ?? '';

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const ev = JSON.parse(line.slice(6));
        switch (ev.type) {
          case 'token': callbacks.onToken(ev.content ?? ''); break;
          case 'tool_start': callbacks.onToolStart(ev.tool ?? '', ev.args); break;
          case 'tool_end': callbacks.onToolEnd(ev.tool ?? '', ev.result); break;
          case 'done': callbacks.onDone(ev.session_id ?? ''); break;
          case 'error': callbacks.onError(ev.message ?? 'Unknown error'); break;
        }
      } catch { /* skip malformed SSE lines */ }
    }
  }
}

// ──────────────────────────────────────────────────────────────────
// Sending a message
// ──────────────────────────────────────────────────────────────────
async function sendMessage(overrideText) {
  const text = (overrideText ?? composerInput.value).trim();
  if (!text || isStreaming) return;

  if (!sessionId) {
    // Startup's session fetch may have failed (e.g. backend was asleep).
    // Try once more right here rather than sending a request the backend
    // will just reject — this also recovers automatically once the
    // backend wakes up, without the person needing to refresh the page.
    try {
      sessionId = await getOrCreateSessionId();
    } catch (err) {
      messages.push({ role: 'assistant', content: '⚠️ Could not start a session — the backend may be waking up. Please try again in a few seconds.', toolCalls: [] });
      renderMessages();
      return;
    }
  }

  composerInput.value = '';
  isStreaming = true;
  sendBtn.textContent = '⏳';
  sendBtn.disabled = true;

  registerSessionIfNew(sessionId, text);
  renderSessionList();

  const history = messages.map(m => ({ role: m.role, content: m.content }));
  messages.push({ role: 'user', content: text, toolCalls: [] });
  messages.push({ role: 'assistant', content: '', toolCalls: [], streaming: true });
  renderMessages();

  const lastIdx = () => messages.length - 1;
  const forceMock = document.getElementById('source-mock').checked;

  try {
    const res = await fetch(`${AGENT_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history, session_id: sessionId, force_mock: forceMock }),
    });

    await parseSSEStream(res, {
      onToken: (token) => {
        messages[lastIdx()].content += token;
        renderMessages();
      },
      onToolStart: (tool, args) => {
        messages[lastIdx()].toolCalls.push({ tool, args, result: null, status: 'running' });
        renderMessages();
      },
      onToolEnd: (tool, result) => {
        const tc = messages[lastIdx()].toolCalls;
        for (let i = tc.length - 1; i >= 0; i--) {
          if (tc[i].tool === tool && tc[i].status === 'running') {
            tc[i].result = result; tc[i].status = 'done'; break;
          }
        }
        renderMessages();
      },
      onDone: () => {
        messages[lastIdx()].streaming = false;
        renderMessages();
        resetComposer();
      },
      onError: (msg) => {
        messages[lastIdx()].content += (messages[lastIdx()].content ? '\n\n' : '') + `⚠️ ${msg}`;
        messages[lastIdx()].streaming = false;
        renderMessages();
        resetComposer();
      },
    });
  } catch {
    messages[lastIdx()].content = '⚠️ Could not reach the agent backend. Check that it is running and reachable.';
    messages[lastIdx()].streaming = false;
    renderMessages();
    resetComposer();
  }
}

function resetComposer() {
  isStreaming = false;
  sendBtn.textContent = '➤';
  sendBtn.disabled = false;
}

// ──────────────────────────────────────────────────────────────────
// Session switching / CAP health check
// ──────────────────────────────────────────────────────────────────
async function switchSession(id) {
  sessionStorage.setItem(SESSION_KEY, id);
  sessionId = id;
  // Show a brief loading state rather than an empty screen — this used
  // to just clear messages and stop, with no fetch ever happening, so an
  // old conversation appeared to "not load" when clicked.
  messages = [{ role: 'assistant', content: '…', toolCalls: [] }];
  renderMessages();
  renderSessionList();

  try {
    const history = await fetchSessionHistory(id);
    messages = history.map(m => ({ role: m.role, content: m.content, toolCalls: [] }));
    if (messages.length === 0) {
      messages = [];
    }
  } catch (err) {
    messages = [{ role: 'assistant', content: `⚠️ ${err.message || 'Could not load this conversation.'}`, toolCalls: [] }];
  }
  renderMessages();
}

async function checkCapHealth() {
  try {
    const res = await fetch(`${AGENT_URL}/health`);
    const data = await res.json();
    capStatusValueEl.textContent = data.cap_service ?? 'unreachable';
    capStatusValueEl.style.color =
      data.cap_service === 'reachable' ? 'var(--success)' :
      data.cap_service === 'unreachable' ? 'var(--error)' : 'var(--text-dim)';
  } catch {
    capStatusValueEl.textContent = 'unreachable';
    capStatusValueEl.style.color = 'var(--error)';
  }
}

// ──────────────────────────────────────────────────────────────────
// Wiring
// ──────────────────────────────────────────────────────────────────
document.getElementById('new-session-btn').onclick = async () => {
  // Prompt is optional — cancelling or leaving it blank falls back to
  // the default 'New conversation' label, same as before this feature
  // existed, so this never blocks the common "just start chatting" flow.
  const name = window.prompt('Name this conversation (optional)', '');
  sessionId = await createNewSession(name);
  messages = [];
  renderMessages();
  renderSessionList();
};

copyBtn.onclick = () => {
  const text = messages.map(m => `${m.role === 'user' ? 'You' : 'Agent'}: ${m.content}`).join('\n\n');
  navigator.clipboard.writeText(text);
};

clearBtn.onclick = () => {
  messages = [];
  renderMessages();
};

sendBtn.onclick = () => sendMessage();
composerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

(async function init() {
  renderPromptChips();
  // Render whatever sessions are already saved locally FIRST, before any
  // network call — this is what was missing before. The old code awaited
  // getOrCreateSessionId() with no error handling; if that fetch failed
  // (e.g. backend briefly asleep), the exception stopped init() entirely
  // and renderSessionList() never ran at all, leaving an empty/broken
  // sidebar with no scrollbar since there was nothing to scroll.
  renderSessionList();
  try {
    sessionId = await getOrCreateSessionId();
  } catch (err) {
    console.error('Could not start a session:', err);
    capStatusValueEl.textContent = 'session error';
    capStatusValueEl.style.color = 'var(--error)';
    // Still let the person retry by sending a message later — sendMessage
    // re-checks for a session id and surfaces a clear error if it's still
    // missing, rather than leaving the whole page silently broken.
  }
  renderMessages();
  checkCapHealth();
})();
</script>
