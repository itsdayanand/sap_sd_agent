<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SD Order Intelligence Agent</title>
<style>
  /* ── Design tokens ──────────────────────────────────────────────
     Deliberately plain CSS, no framework, no build step. A working
     tool for SAP consultants, not a marketing surface. */
  :root {
    --bg: #0f1419;
    --surface: #161d26;
    --surface-raised: #1c2530;
    --border: #2a3441;
    --text: #e8ecf1;
    --text-dim: #8b97a6;
    --accent: #e0a458;
    --user-bubble: #2563a8;
    --success: #5fb88a;
    --warn: #d98a3d;
    --error: #d9636b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14.5px;
  }
  button { font-family: inherit; cursor: pointer; }
  code { font-family: 'SF Mono', Consolas, monospace; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  #app { display: flex; height: 100vh; }

  /* ── Sidebar ────────────────────────────────────────────────── */
  #sidebar {
    width: 230px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 12px;
    flex-shrink: 0;
  }
  #sidebar .brand { display: flex; align-items: center; gap: 8px; padding: 4px 4px 16px; }
  #sidebar .brand-title { font-weight: 700; font-size: 14px; }
  #sidebar .brand-sub { font-size: 11px; color: var(--text-dim); }
  #new-session-btn {
    background: var(--accent); color: #1a1208; border: none; border-radius: 6px;
    padding: 8px 12px; font-weight: 600; font-size: 13px; margin-bottom: 12px;
  }
  #session-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .session-item {
    text-align: left; background: transparent; border: none; border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-item.active { background: var(--surface-raised); }
  #cap-status { font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }

  /* ── Main chat column ───────────────────────────────────────── */
  #main { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header p { font-size: 12px; margin: 0; color: var(--text-dim); }
  .header-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 6px; padding: 6px 12px; font-size: 12px;
  }
  .header-btn:disabled { opacity: 0.5; cursor: default; }

  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .empty-hint { color: var(--text-dim); font-size: 13px; padding: 8px 4px 4px; }

  .msg-row { display: flex; gap: 8px; }
  .msg-row.user { justify-content: flex-end; }
  .msg-icon { font-size: 22px; }
  .bubble {
    max-width: 75%; border-radius: 16px; padding: 10px 14px;
    font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }
  .bubble.assistant { background: var(--surface); border: 1px solid var(--border); }
  .bubble.user { background: var(--user-bubble); color: #fff; }
  .cursor { animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Tool call panel ────────────────────────────────────────── */
  .tool-panel {
    margin: 4px 0 0 40px; border-radius: 6px; border: 1px solid var(--border);
    overflow: hidden; font-size: 13px; background: var(--surface);
  }
  .tool-panel-toggle {
    width: 100%; padding: 8px 12px; text-align: left; color: var(--text-dim);
    background: transparent; border: none; display: flex; align-items: center; gap: 8px;
  }
  .tool-call-detail { padding: 8px 12px; border-top: 1px solid var(--border); }
  .tool-call-detail .row { display: flex; justify-content: space-between; margin-bottom: 4px; font-weight: 600; }
  .tool-call-detail .status-running { color: var(--warn); }
  .tool-call-detail .status-done { color: var(--success); }
  .tool-call-detail code {
    display: block; font-size: 12px; background: var(--surface-raised);
    border-radius: 4px; padding: 4px; margin-bottom: 4px; white-space: pre-wrap; word-break: break-word;
  }

  /* ── Prompt chips ───────────────────────────────────────────── */
  #prompt-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 16px; }
  .chip {
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
    border-radius: 999px; padding: 6px 14px; font-size: 13px;
  }

  /* ── Composer ───────────────────────────────────────────────── */
  footer { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #composer-input {
    flex: 1; padding: 10px 16px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px;
  }
  #send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: var(--accent); color: #1a1208; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #send-btn:disabled { background: var(--border); }
</style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <span style="font-size:20px;">🛰️</span>
        <div>
          <div class="brand-title">SD Order Intelligence</div>
          <div class="brand-sub">SAP AI Agent · BTP Trial</div>
        </div>
      </div>
      <button id="new-session-btn">+ New conversation</button>
      <div id="session-list"></div>
      <div id="cap-status">CAP service: <span id="cap-status-value">checking…</span></div>
    </aside>

    <div id="main">
      <header>
        <div>
          <h1>SD Order Intelligence Agent</h1>
          <p>CAP · FastAPI · GPT-4o · SQLite · SAP S/4HANA Sandbox</p>
        </div>
        <div style="display:flex; gap:8px;">
          <button id="copy-btn" class="header-btn" disabled>Copy</button>
          <button id="clear-btn" class="header-btn" disabled>Clear</button>
        </div>
      </header>

      <main id="messages">
        <div class="empty-hint" id="empty-hint">
          Ask about open orders, deliveries, pricing, or billing for any sandbox customer.
        </div>
      </main>

      <div id="prompt-chips"></div>

      <footer>
        <input id="composer-input" type="text" placeholder="Ask about orders, deliveries, pricing, billing…" />
        <button id="send-btn">➤</button>
      </footer>
    </div>
  </div>

<script>
// ──────────────────────────────────────────────────────────────────
// Configuration
// ──────────────────────────────────────────────────────────────────
// In production, this UI is served by the SAME CAP app as the OData
// service, so relative paths would work for CAP's own endpoints.
// AGENT_URL points at the separate FastAPI service, which is a
// different app/route on CF. Set this via the AGENT_URL global
// below before deploying, or override at runtime with
// ?agent=https://your-fastapi-route... for local testing.
const AGENT_URL = (new URLSearchParams(location.search).get('agent'))
  || window.AGENT_URL
  || 'https://sd-agent-backend.cfapps.us10-001.hana.ondemand.com';

const TOOL_ICONS = {
  get_sales_orders: '📋',
  get_customer_details: '👤',
  get_pricing_conditions: '💰',
  get_delivery_status: '🚚',
  get_billing_documents: '🧾',
};

const PROMPTS = [
  'Show open orders for customer 10100001',
  'Check delivery status for order 10',
  'Any pricing discounts for customer 10100001 on material MAT-100?',
  'Status of all orders for customer 10100001 — any issues?',
];

// ──────────────────────────────────────────────────────────────────
// Session management (sessionStorage + localStorage, no React state)
// ──────────────────────────────────────────────────────────────────
const SESSION_KEY = 'sd-agent-session-id';
const SESSIONS_LIST_KEY = 'sd-agent-session-list';

function listSessions() {
  try {
    const raw = localStorage.getItem(SESSIONS_LIST_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveSessionsList(sessions) {
  localStorage.setItem(SESSIONS_LIST_KEY, JSON.stringify(sessions.slice(0, 50)));
}

function registerSessionIfNew(id, label) {
  const sessions = listSessions();
  if (sessions.some(s => s.id === id)) return;
  sessions.unshift({ id, label: (label || 'New conversation').slice(0, 60), createdAt: Date.now() });
  saveSessionsList(sessions);
}

async function fetchNewSessionId() {
  const res = await fetch(`${AGENT_URL}/api/session/new`, { method: 'POST' });
  if (!res.ok) throw new Error('Could not start a new session.');
  const data = await res.json();
  return data.session_id;
}

async function getOrCreateSessionId() {
  const existing = sessionStorage.getItem(SESSION_KEY);
  if (existing) return existing;
  const id = await fetchNewSessionId();
  sessionStorage.setItem(SESSION_KEY, id);
  return id;
}

async function createNewSession() {
  const id = await fetchNewSessionId();
  sessionStorage.setItem(SESSION_KEY, id);
  const sessions = listSessions();
  sessions.unshift({ id, label: 'New conversation', createdAt: Date.now() });
  saveSessionsList(sessions);
  return id;
}

// ──────────────────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────────────────
let sessionId = null;
let isStreaming = false;
let messages = []; // [{ role, content, toolCalls: [{tool,args,result,status}] }]

// ──────────────────────────────────────────────────────────────────
// Rendering
// ──────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const emptyHintEl = document.getElementById('empty-hint');
const promptChipsEl = document.getElementById('prompt-chips');
const copyBtn = document.getElementById('copy-btn');
const clearBtn = document.getElementById('clear-btn');
const sendBtn = document.getElementById('send-btn');
const composerInput = document.getElementById('composer-input');
const sessionListEl = document.getElementById('session-list');
const capStatusValueEl = document.getElementById('cap-status-value');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Minimal markdown: bold, inline code, and line breaks only.
// Intentionally not a full markdown renderer — keeps this file
// dependency-free. Good enough for the agent's short business summaries.
function renderMarkdownLite(text) {
  let safe = escapeHtml(text);
  safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
  safe = safe.replace(/\n/g, '<br>');
  return safe;
}

function renderMessages() {
  messagesEl.querySelectorAll('.msg-row, .tool-panel').forEach(el => el.remove());
  emptyHintEl.style.display = messages.length ? 'none' : 'block';
  copyBtn.disabled = !messages.length;
  clearBtn.disabled = !messages.length;
  promptChipsEl.style.display = messages.length ? 'none' : 'flex';

  for (const msg of messages) {
    const row = document.createElement('div');
    row.className = `msg-row ${msg.role}`;

    if (msg.role === 'assistant') {
      const icon = document.createElement('span');
      icon.className = 'msg-icon';
      icon.textContent = '🛰️';
      row.appendChild(icon);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${msg.role}`;
    bubble.innerHTML = renderMarkdownLite(msg.content || (msg.streaming ? '…' : ''));
    if (msg.streaming) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '▌';
      bubble.appendChild(cursor);
    }
    row.appendChild(bubble);

    if (msg.role === 'user') {
      const icon = document.createElement('span');
      icon.className = 'msg-icon';
      icon.textContent = '🧑‍💼';
      row.appendChild(icon);
    }

    messagesEl.appendChild(row);

    if (msg.toolCalls && msg.toolCalls.length) {
      messagesEl.appendChild(renderToolPanel(msg.toolCalls));
    }
  }

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderToolPanel(toolCalls) {
  const panel = document.createElement('div');
  panel.className = 'tool-panel';

  const toggle = document.createElement('button');
  toggle.className = 'tool-panel-toggle';
  let open = false;
  toggle.textContent = `🔍 Agent used ${toolCalls.length} SAP tool${toolCalls.length > 1 ? 's' : ''} ▼`;

  const detailsWrap = document.createElement('div');
  detailsWrap.style.display = 'none';

  toggle.onclick = () => {
    open = !open;
    detailsWrap.style.display = open ? 'block' : 'none';
    toggle.textContent = `🔍 Agent used ${toolCalls.length} SAP tool${toolCalls.length > 1 ? 's' : ''} ${open ? '▲' : '▼'}`;
  };

  for (const tc of toolCalls) {
    const detail = document.createElement('div');
    detail.className = 'tool-call-detail';

    const row = document.createElement('div');
    row.className = 'row';
    const name = document.createElement('span');
    name.textContent = `${TOOL_ICONS[tc.tool] || '⚙️'} ${tc.tool}`;
    const status = document.createElement('span');
    status.className = tc.status === 'running' ? 'status-running' : 'status-done';
    status.textContent = tc.status === 'running' ? '⏳ Running…' : '✅ Done';
    row.appendChild(name);
    row.appendChild(status);
    detail.appendChild(row);

    const argsCode = document.createElement('code');
    argsCode.textContent = `Params: ${JSON.stringify(tc.args)}`;
    detail.appendChild(argsCode);

    if (tc.result != null) {
      const resultStr = JSON.stringify(tc.result);
      const resultCode = document.createElement('code');
      resultCode.textContent = resultStr.length > 400 ? resultStr.slice(0, 400) + '…' : resultStr;
      detail.appendChild(resultCode);
    }

    detailsWrap.appendChild(detail);
  }

  panel.appendChild(toggle);
  panel.appendChild(detailsWrap);
  return panel;
}

function renderPromptChips() {
  promptChipsEl.innerHTML = '';
  for (const p of PROMPTS) {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = p;
    chip.onclick = () => sendMessage(p);
    promptChipsEl.appendChild(chip);
  }
}

function renderSessionList() {
  sessionListEl.innerHTML = '';
  const sessions = listSessions();
  if (!sessions.length) {
    const empty = document.createElement('div');
    empty.style.color = 'var(--text-dim)';
    empty.style.fontSize = '12px';
    empty.style.padding = '8px';
    empty.textContent = 'No saved conversations yet.';
    sessionListEl.appendChild(empty);
    return;
  }
  for (const s of sessions) {
    const btn = document.createElement('button');
    btn.className = 'session-item' + (s.id === sessionId ? ' active' : '');
    btn.textContent = s.label;
    btn.title = s.label;
    btn.onclick = () => switchSession(s.id);
    sessionListEl.appendChild(btn);
  }
}

// ──────────────────────────────────────────────────────────────────
// SSE streaming
// ──────────────────────────────────────────────────────────────────
async function parseSSEStream(response, callbacks) {
  if (!response.body) { callbacks.onError('No response body from server.'); return; }
  if (!response.ok) {
    let detail = '';
    try { detail = (await response.json()).detail || ''; } catch {}
    callbacks.onError(detail || `Server returned ${response.status}.`);
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() ?? '';

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const ev = JSON.parse(line.slice(6));
        switch (ev.type) {
          case 'token': callbacks.onToken(ev.content ?? ''); break;
          case 'tool_start': callbacks.onToolStart(ev.tool ?? '', ev.args); break;
          case 'tool_end': callbacks.onToolEnd(ev.tool ?? '', ev.result); break;
          case 'done': callbacks.onDone(ev.session_id ?? ''); break;
          case 'error': callbacks.onError(ev.message ?? 'Unknown error'); break;
        }
      } catch { /* skip malformed SSE lines */ }
    }
  }
}

// ──────────────────────────────────────────────────────────────────
// Sending a message
// ──────────────────────────────────────────────────────────────────
async function sendMessage(overrideText) {
  const text = (overrideText ?? composerInput.value).trim();
  if (!text || isStreaming) return;
  composerInput.value = '';
  isStreaming = true;
  sendBtn.textContent = '⏳';
  sendBtn.disabled = true;

  registerSessionIfNew(sessionId, text);
  renderSessionList();

  const history = messages.map(m => ({ role: m.role, content: m.content }));
  messages.push({ role: 'user', content: text, toolCalls: [] });
  messages.push({ role: 'assistant', content: '', toolCalls: [], streaming: true });
  renderMessages();

  const lastIdx = () => messages.length - 1;

  try {
    const res = await fetch(`${AGENT_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history, session_id: sessionId }),
    });

    await parseSSEStream(res, {
      onToken: (token) => {
        messages[lastIdx()].content += token;
        renderMessages();
      },
      onToolStart: (tool, args) => {
        messages[lastIdx()].toolCalls.push({ tool, args, result: null, status: 'running' });
        renderMessages();
      },
      onToolEnd: (tool, result) => {
        const tc = messages[lastIdx()].toolCalls;
        for (let i = tc.length - 1; i >= 0; i--) {
          if (tc[i].tool === tool && tc[i].status === 'running') {
            tc[i].result = result; tc[i].status = 'done'; break;
          }
        }
        renderMessages();
      },
      onDone: () => {
        messages[lastIdx()].streaming = false;
        renderMessages();
        resetComposer();
      },
      onError: (msg) => {
        messages[lastIdx()].content += (messages[lastIdx()].content ? '\n\n' : '') + `⚠️ ${msg}`;
        messages[lastIdx()].streaming = false;
        renderMessages();
        resetComposer();
      },
    });
  } catch {
    messages[lastIdx()].content = '⚠️ Could not reach the agent backend. Check that it is running and reachable.';
    messages[lastIdx()].streaming = false;
    renderMessages();
    resetComposer();
  }
}

function resetComposer() {
  isStreaming = false;
  sendBtn.textContent = '➤';
  sendBtn.disabled = false;
}

// ──────────────────────────────────────────────────────────────────
// Session switching / CAP health check
// ──────────────────────────────────────────────────────────────────
function switchSession(id) {
  sessionStorage.setItem(SESSION_KEY, id);
  sessionId = id;
  messages = [];
  renderMessages();
  renderSessionList();
}

async function checkCapHealth() {
  try {
    const res = await fetch(`${AGENT_URL}/health`);
    const data = await res.json();
    capStatusValueEl.textContent = data.cap_service ?? 'unreachable';
    capStatusValueEl.style.color =
      data.cap_service === 'reachable' ? 'var(--success)' :
      data.cap_service === 'unreachable' ? 'var(--error)' : 'var(--text-dim)';
  } catch {
    capStatusValueEl.textContent = 'unreachable';
    capStatusValueEl.style.color = 'var(--error)';
  }
}

// ──────────────────────────────────────────────────────────────────
// Wiring
// ──────────────────────────────────────────────────────────────────
document.getElementById('new-session-btn').onclick = async () => {
  sessionId = await createNewSession();
  messages = [];
  renderMessages();
  renderSessionList();
};

copyBtn.onclick = () => {
  const text = messages.map(m => `${m.role === 'user' ? 'You' : 'Agent'}: ${m.content}`).join('\n\n');
  navigator.clipboard.writeText(text);
};

clearBtn.onclick = () => {
  messages = [];
  renderMessages();
};

sendBtn.onclick = () => sendMessage();
composerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

(async function init() {
  renderPromptChips();
  sessionId = await getOrCreateSessionId();
  renderSessionList();
  renderMessages();
  checkCapHealth();
})();
</script>
</body>
</html>
